services:
  mongo:
    image: mongo:7
    container_name: civicpulse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: civicpulse-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: "4000"
      WEB_ORIGIN: "http://localhost:8080,http://frontend"
      MONGODB_URI: "mongodb://mongo:27017/pune-pulse"
      MONGODB_DB_NAME: "pune-pulse"
      OTP_EXPOSE_DEV_CODE: "true"
      WHATSAPP_OTP_ENABLED: "false"
    ports:
      - "4000:4000"
    volumes:
      - backend_uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    container_name: civicpulse-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  mongo_data:
  backend_uploads:
